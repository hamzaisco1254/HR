<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — PLW Tunisia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'Inter','Segoe UI',system-ui,sans-serif;
  background:#0a0e1a;overflow:hidden;position:relative;}

/* Animated gradient background */
.bg-gradient{position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#0a0e1a 0%,#111937 30%,#162142 50%,#1a2a5e 70%,#0f1729 100%);}
.bg-gradient::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 30% 50%,rgba(214,30,139,.08) 0%,transparent 50%),
  radial-gradient(ellipse at 70% 30%,rgba(99,102,241,.06) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 80%,rgba(236,72,153,.05) 0%,transparent 50%);
  animation:bgPulse 15s ease-in-out infinite alternate;}
@keyframes bgPulse{0%{transform:translate(0,0) scale(1);}100%{transform:translate(-3%,2%) scale(1.05);}}

/* Floating orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.3;z-index:0;}
.orb-1{width:400px;height:400px;background:rgba(214,30,139,.15);top:-100px;right:-100px;animation:float1 20s ease-in-out infinite;}
.orb-2{width:300px;height:300px;background:rgba(99,102,241,.12);bottom:-50px;left:-50px;animation:float2 25s ease-in-out infinite;}
.orb-3{width:200px;height:200px;background:rgba(236,72,153,.1);top:50%;left:60%;animation:float3 18s ease-in-out infinite;}
@keyframes float1{0%,100%{transform:translate(0,0);}50%{transform:translate(-30px,40px);}}
@keyframes float2{0%,100%{transform:translate(0,0);}50%{transform:translate(40px,-30px);}}
@keyframes float3{0%,100%{transform:translate(0,0);}50%{transform:translate(-20px,-20px);}}

/* Grid pattern overlay */
.grid-pattern{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:60px 60px;}

.login-card{position:relative;z-index:10;width:440px;max-width:92vw;
  animation:cardEnter .7s cubic-bezier(.16,1,.3,1) both;}
@keyframes cardEnter{from{opacity:0;transform:translateY(30px) scale(.96);}to{opacity:1;transform:none;}}

.card-inner{background:rgba(255,255,255,.03);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,.08);border-radius:24px;
  padding:48px 44px;position:relative;overflow:hidden;}
.card-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);}
.card-inner::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 50% 0%,rgba(214,30,139,.05),transparent 60%);
  pointer-events:none;}

/* Logo */
.logo-wrap{text-align:center;margin-bottom:36px;position:relative;z-index:1;}
.logo-icon{width:72px;height:72px;margin:0 auto 16px;position:relative;}
.logo-icon svg{width:100%;height:100%;filter:drop-shadow(0 4px 20px rgba(214,30,139,.3));}
.logo-wrap h1{font-size:24px;color:#fff;font-weight:800;letter-spacing:-.5px;}
.logo-wrap p{font-size:11px;color:rgba(214,30,139,.9);font-weight:700;
  letter-spacing:3px;text-transform:uppercase;margin-top:6px;}

/* Form */
.field{margin-bottom:20px;position:relative;z-index:1;}
.field label{display:block;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.field .input-wrap{position:relative;}
.field .input-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,.25);pointer-events:none;transition:color .3s;}
.field input{width:100%;padding:14px 16px 14px 44px;
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);
  border-radius:12px;font-size:14px;color:#fff;font-family:inherit;
  transition:all .3s ease;}
.field input::placeholder{color:rgba(255,255,255,.25);}
.field input:focus{border-color:rgba(214,30,139,.5);outline:none;
  background:rgba(255,255,255,.08);
  box-shadow:0 0 0 4px rgba(214,30,139,.1),0 0 20px rgba(214,30,139,.05);}
.field input:focus ~ .icon,.field input:focus + .icon,
.field:focus-within .icon{color:rgba(214,30,139,.7);}

.btn-login{position:relative;z-index:1;width:100%;padding:15px;
  background:linear-gradient(135deg,#D61E8B,#a8156e);
  color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;transition:all .3s ease;
  box-shadow:0 4px 20px rgba(214,30,139,.3);letter-spacing:.3px;}
.btn-login:hover{transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(214,30,139,.4);
  background:linear-gradient(135deg,#e0258f,#b81970);}
.btn-login:active{transform:translateY(0) scale(.98);
  box-shadow:0 2px 10px rgba(214,30,139,.3);}

/* Spinner inside button */
.btn-login .btn-spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-login.loading .btn-text{display:none;}
.btn-login.loading .btn-spinner{display:block;}

/* Error */
.error-msg{position:relative;z-index:1;
  background:rgba(220,53,69,.1);color:#ff6b7a;
  padding:12px 16px;border-radius:12px;font-size:13px;font-weight:600;
  margin-bottom:20px;border:1px solid rgba(220,53,69,.2);
  display:flex;align-items:center;gap:8px;
  animation:shake .4s ease-in-out;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.error-msg svg{flex-shrink:0;}

.footer{position:relative;z-index:1;text-align:center;margin-top:28px;
  font-size:11px;color:rgba(255,255,255,.25);line-height:1.6;}
.footer span{color:rgba(214,30,139,.7);font-weight:700;}

/* Bottom branding */
.bottom-brand{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:5;
  font-size:10px;color:rgba(255,255,255,.15);letter-spacing:2px;text-transform:uppercase;font-weight:600;}
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="grid-pattern"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-card">
  <div class="card-inner">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gShield" x1="0" y1="0" x2="72" y2="72">
              <stop offset="0%" stop-color="#D61E8B"/>
              <stop offset="100%" stop-color="#8B15A6"/>
            </linearGradient>
            <linearGradient id="gInner" x1="10" y1="10" x2="62" y2="62">
              <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
            </linearGradient>
            <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <!-- Outer hexagon -->
          <path d="M36 4L64 18V54L36 68L8 54V18Z" fill="url(#gShield)" opacity=".9"/>
          <!-- Inner hex border -->
          <path d="M36 10L58 22V50L36 62L14 50V22Z" fill="url(#gInner)" stroke="rgba(255,255,255,0.15)" stroke-width=".5"/>
          <!-- PLW text -->
          <text x="36" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif"
                font-size="18" font-weight="900" fill="white" filter="url(#glow)"
                letter-spacing="2">PLW</text>
          <!-- Small decorative lines -->
          <line x1="22" y1="48" x2="50" y2="48" stroke="rgba(255,255,255,0.3)" stroke-width=".8"/>
          <circle cx="36" cy="24" r="2" fill="rgba(255,255,255,0.4)"/>
        </svg>
      </div>
      <h1>HR Automated Docs</h1>
      <p>PLW Tunisia</p>
    </div>

    {% if error %}
    <div class="error-msg">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#ff6b7a" stroke-width="1.5"/><path d="M8 4.5v4M8 10.5v.5" stroke="#ff6b7a" stroke-width="1.5" stroke-linecap="round"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" id="login-form">
      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <input type="email" name="email" placeholder="votre@email.com" required autofocus>
          <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M22 7l-10 6L2 7"/></svg>
        </div>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="input-wrap">
          <input type="password" name="password" placeholder="Mot de passe" required>
          <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1" fill="currentColor"/></svg>
        </div>
      </div>
      <button type="submit" class="btn-login" id="btn-submit">
        <span class="btn-text">Se Connecter</span>
        <div class="btn-spinner"></div>
      </button>
    </form>

    <div class="footer">
      Plateforme de gestion RH & Finance<br>
      <span>PLW Tunisia</span> &middot; Tous droits reservés
    </div>
  </div>
</div>

<div class="bottom-brand">Powered by PLW</div>

<script>
document.getElementById('login-form').addEventListener('submit',function(){
  document.getElementById('btn-submit').classList.add('loading');
});
</script>
</body>
</html>

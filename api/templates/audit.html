<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audit Log — PLW</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1020; --surface: #141a2e; --border: #232b47;
    --text: #e9ecf4; --muted: #8892ad; --pink: #e91e63; --accent: #7c3aed;
    --ok: #10b981; --fail: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a2140 0%, #0f1528 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px; display: flex; justify-content: space-between;
    align-items: center; position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0; font-size: 20px; font-weight: 700; }
  header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .back {
    padding: 8px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); text-decoration: none; font-size: 13px;
    font-weight: 500; transition: all .15s;
  }
  .back:hover { background: var(--accent); border-color: var(--accent); }
  main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }
  .filters {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .filters input, .filters select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 8px; font-size: 13px; font-family: inherit;
    min-width: 200px;
  }
  .filters button {
    background: var(--pink); border: none; color: #fff; padding: 10px 20px;
    border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit;
  }
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 16px 20px; border-radius: 12px;
  }
  .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .5px; margin-bottom: 4px; }
  .stat-card .value { font-size: 22px; font-weight: 700; }
  table {
    width: 100%; background: var(--surface); border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border); border-collapse: collapse;
  }
  thead { background: #1a2140; }
  th, td {
    padding: 12px 16px; text-align: left; font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  th { font-weight: 600; color: var(--muted); text-transform: uppercase;
       letter-spacing: .3px; font-size: 10px; }
  tr:hover td { background: rgba(124, 58, 237, 0.05); }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
  }
  .badge.ok   { background: rgba(16, 185, 129, .15); color: var(--ok); }
  .badge.fail { background: rgba(239, 68, 68, .15); color: var(--fail); }
  .action { font-family: 'JetBrains Mono', monospace; font-size: 11px;
            color: #a78bfa; }
  .empty { text-align: center; padding: 40px; color: var(--muted); }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <div>
      <h1>Audit Log</h1>
      <div class="sub">Journal des actions utilisateurs — administrateurs uniquement</div>
    </div>
    <a class="back" href="/">← Retour</a>
  </header>
  <main>
    <div class="stats" id="stats"></div>
    <div class="filters">
      <input id="filter" type="text" placeholder="Filtrer par action (ex: user.delete)">
      <select id="limit">
        <option value="50">50 entrées</option>
        <option value="100" selected>100 entrées</option>
        <option value="250">250 entrées</option>
        <option value="500">500 entrées</option>
      </select>
      <button id="refresh">Actualiser</button>
    </div>
    <table id="tbl">
      <thead>
        <tr>
          <th>Horodatage (UTC)</th>
          <th>Action</th>
          <th>Acteur</th>
          <th>Entité</th>
          <th>IP</th>
          <th>Statut</th>
          <th>Détails</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="7" class="empty">Chargement…</td></tr>
      </tbody>
    </table>
  </main>
<script>
async function load() {
  const filter = document.getElementById('filter').value.trim();
  const limit  = document.getElementById('limit').value;
  const params = new URLSearchParams({ limit });
  if (filter) params.set('action', filter);
  const res  = await fetch('/api/audit/list?' + params.toString());
  if (!res.ok) {
    document.getElementById('rows').innerHTML =
      '<tr><td colspan="7" class="empty">Accès refusé ou erreur.</td></tr>';
    return;
  }
  const data = await res.json();
  // stats
  const stats = data.stats || {};
  const byAction = stats.recent_by_action || {};
  const topActions = Object.entries(byAction).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="label">Total événements</div>
      <div class="value">${stats.total_entries || 0}</div>
    </div>
    ${topActions.map(([a,c])=>`
      <div class="stat-card">
        <div class="label">${a}</div>
        <div class="value">${c}</div>
      </div>
    `).join('')}
  `;
  // rows
  const entries = data.entries || [];
  if (!entries.length) {
    document.getElementById('rows').innerHTML =
      '<tr><td colspan="7" class="empty">Aucune entrée.</td></tr>';
    return;
  }
  document.getElementById('rows').innerHTML = entries.map(e => `
    <tr>
      <td class="mono">${e.ts || ''}</td>
      <td class="action">${escape(e.action || '')}</td>
      <td>${escape(e.actor_email || '—')}</td>
      <td>${escape(e.entity_type || '')}${e.entity_id ? ' · <span class="mono">' + escape(e.entity_id) + '</span>' : ''}</td>
      <td class="mono">${escape(e.ip || '')}</td>
      <td><span class="badge ${e.ok ? 'ok' : 'fail'}">${e.ok ? 'OK' : 'ERR'}</span></td>
      <td class="mono">${escape(e.details || '')}</td>
    </tr>
  `).join('');
}
function escape(s) {
  return String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'})[c]);
}
document.getElementById('refresh').addEventListener('click', load);
document.getElementById('filter').addEventListener('keypress', e => { if (e.key === 'Enter') load(); });
load();
</script>
</body>
</html>
